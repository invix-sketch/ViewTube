<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewTube</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #ff3b3b;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --live: #ff3b3b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    flex-shrink: 0;
    cursor: pointer;
  }

  .search-wrap {
    flex: 1;
    max-width: 640px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 48px 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-btn {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 3px;
    width: 36px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .search-btn:hover { background: var(--accent2); }
  .search-btn svg { width: 16px; height: 16px; fill: white; }

  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .tab {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tab.active, .tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* API KEY SETUP */
  #setup-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 64px);
    padding: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .setup-card .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .setup-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .setup-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .setup-card a { color: var(--accent); text-decoration: none; }

  .setup-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .setup-card input:focus { border-color: var(--accent); }

  .setup-card button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .setup-card button:hover { background: var(--accent2); }

  /* MAIN LAYOUT */
  #main {
    display: none;
    padding: 24px;
    gap: 24px;
  }

  #main.has-video {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto auto;
  }

  #main.no-video {
    display: block;
  }

  /* VIDEO PLAYER */
  .player-section {
    grid-column: 1;
  }

  .player-wrap {
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 16/9;
    position: relative;
  }

  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .video-meta {
    margin-top: 16px;
  }

  .video-title-display {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .video-channel {
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-badge {
    background: var(--live);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* RESULTS SIDEBAR & GRID */
  .results-sidebar {
    grid-column: 2;
    grid-row: 1 / 3;
    overflow-y: auto;
    max-height: calc(100vh - 112px);
    padding-right: 4px;
  }

  .results-sidebar::-webkit-scrollbar { width: 4px; }
  .results-sidebar::-webkit-scrollbar-track { background: transparent; }
  .results-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 24px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .card-thumb {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--surface2);
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .card:hover .card-thumb img { transform: scale(1.04); }

  .thumb-live {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--live);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .thumb-duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 2px;
  }

  .card-info {
    padding: 12px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-channel {
    font-size: 12px;
    color: var(--muted);
  }

  /* Sidebar card variant */
  .results-sidebar .card {
    display: flex;
    gap: 10px;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 4px;
  }

  .results-sidebar .card-thumb {
    flex-shrink: 0;
    width: 140px;
    border-radius: 3px;
  }

  .results-sidebar .card-info {
    padding: 0;
    flex: 1;
  }

  .results-sidebar .card-title { font-size: 12px; }

  /* STATES */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state .big-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: var(--text);
    opacity: 0.4;
  }

  .loading {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,59,59,0.1);
    border: 1px solid rgba(255,59,59,0.3);
    border-radius: 4px;
    padding: 12px 16px;
    color: #ff6b6b;
    font-size: 13px;
    margin: 16px 0;
  }

  /* CHANGE KEY BUTTON */
  .change-key {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .change-key:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 900px) {
    header { gap: 12px; }
    .filter-tabs { display: none; }
    #main.has-video {
      grid-template-columns: 1fr;
    }
    .results-sidebar {
      grid-column: 1;
      max-height: none;
    }
  }

  @media (max-width: 600px) {
    header { padding: 0 12px; gap: 8px; }
    #main { padding: 12px; }
    .logo { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">ViewTube</div>
  <div class="search-wrap" id="search-wrap" style="display:none">
    <input type="text" id="search-input" placeholder="Search videos, channels, livestreams…" />
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
    </button>
  </div>
  <div class="filter-tabs" id="filter-tabs" style="display:none">
    <button class="tab active" onclick="setFilter('all', this)">All</button>
    <button class="tab" onclick="setFilter('video', this)">Videos</button>
    <button class="tab" onclick="setFilter('live', this)">🔴 Live</button>
    <button class="tab" onclick="setFilter('channel', this)">Channels</button>
  </div>
  <button class="change-key" id="change-key-btn" style="display:none" onclick="showSetup()">API Key</button>
</header>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="icon">📺</div>
    <h2>ViewTube Setup</h2>
    <p>Enter your YouTube Data API v3 key to get started. Get one free at <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a> — enable the YouTube Data API v3.</p>
    <input type="password" id="api-key-input" placeholder="AIza…" />
    <div id="setup-error"></div>
    <button onclick="saveApiKey()">Start Watching →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main">
  <div id="player-section" class="player-section" style="display:none">
    <div class="player-wrap">
      <iframe id="yt-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="video-meta">
      <div class="video-title-display" id="now-playing-title"></div>
      <div class="video-channel" id="now-playing-channel"></div>
    </div>
  </div>

  <div id="results-sidebar" class="results-sidebar" style="display:none">
    <div class="section-label">Results</div>
    <div id="sidebar-list"></div>
  </div>

  <div id="content-area">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">🎬</div>
      <h3>Search Anything</h3>
      <p>Videos, channels, and livestreams</p>
    </div>
    <div class="results-grid" id="results-grid" style="display:none"></div>
  </div>
</div>

<script>
  let API_KEY = '';
  let currentFilter = 'all';

  // ─── INIT ───────────────────────────────────────────
  function init() {
    const saved = localStorage.getItem('yt_api_key');
    if (saved) {
      API_KEY = saved;
      showApp();
    }
  }

  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) return;
    API_KEY = val;
    localStorage.setItem('yt_api_key', val);
    showApp();
  }

  function showSetup() {
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
    document.getElementById('search-wrap').style.display = 'none';
    document.getElementById('filter-tabs').style.display = 'none';
    document.getElementById('change-key-btn').style.display = 'none';
  }

  function showApp() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main').className = 'no-video';
    document.getElementById('main').style.display = 'block';
    document.getElementById('search-wrap').style.display = 'flex';
    document.getElementById('filter-tabs').style.display = 'flex';
    document.getElementById('change-key-btn').style.display = 'block';
  }

  function goHome() {
    if (!API_KEY) return;
    document.getElementById('player-section').style.display = 'none';
    document.getElementById('results-sidebar').style.display = 'none';
    document.getElementById('main').className = 'no-video';
    document.getElementById('results-grid').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('search-input').value = '';
  }

  // ─── SEARCH ─────────────────────────────────────────
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    showLoading();

    let params = new URLSearchParams({
      part: 'snippet',
      q,
      key: API_KEY,
      maxResults: 24,
      type: currentFilter === 'all' ? 'video,channel' :
            currentFilter === 'live' ? 'video' :
            currentFilter === 'channel' ? 'channel' : 'video',
    });

    if (currentFilter === 'live') params.append('eventType', 'live');

    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
      const data = await res.json();

      if (data.error) {
        showError(data.error.message);
        return;
      }

      renderResults(data.items || [], q);
    } catch (e) {
      showError('Network error. Check your connection.');
    }
  }

  // ─── RENDER ──────────────────────────────────────────
  function renderResults(items, query) {
    // Reset layout to no-video grid
    document.getElementById('player-section').style.display = 'none';
    document.getElementById('results-sidebar').style.display = 'none';
    document.getElementById('main').className = 'no-video';
    document.getElementById('empty-state').style.display = 'none';

    const grid = document.getElementById('results-grid');
    grid.style.display = 'grid';
    grid.innerHTML = '';

    if (!items.length) {
      grid.innerHTML = '<p style="color:var(--muted);padding:24px;font-size:14px;">No results found.</p>';
      return;
    }

    items.forEach(item => {
      const isLive = item.snippet.liveBroadcastContent === 'live';
      const isChannel = item.id.kind === 'youtube#channel';
      const videoId = item.id.videoId;
      const channelId = item.id.channelId;
      const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '';
      const title = item.snippet.title;
      const channel = item.snippet.channelTitle;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${thumb}" alt="" loading="lazy" />
          ${isLive ? '<span class="thumb-live">● LIVE</span>' : ''}
        </div>
        <div class="card-info">
          <div class="card-title">${escHtml(title)}</div>
          <div class="card-channel">${escHtml(channel)}</div>
        </div>
      `;

      if (isChannel) {
        card.onclick = () => searchChannel(channelId, title);
      } else {
        card.onclick = () => playVideo(videoId, title, channel, isLive, items, query);
      }

      grid.appendChild(card);
    });
  }

  function playVideo(videoId, title, channel, isLive, allItems, query) {
    // Switch to player + sidebar layout
    document.getElementById('main').className = 'has-video';
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('results-grid').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';

    // Set player
    const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
    document.getElementById('yt-player').src = embedUrl;
    document.getElementById('now-playing-title').textContent = title;
    document.getElementById('now-playing-channel').innerHTML =
      escHtml(channel) + (isLive ? ' <span class="live-badge">● Live</span>' : '');

    // Sidebar with rest of results
    const sidebar = document.getElementById('results-sidebar');
    const sidebarList = document.getElementById('sidebar-list');
    sidebar.style.display = 'block';
    sidebarList.innerHTML = '';

    const others = allItems.filter(i => i.id.videoId !== videoId);
    others.forEach(item => {
      const il = item.snippet.liveBroadcastContent === 'live';
      const vid = item.id.videoId;
      const ch = item.id.channelId;
      const thumb = item.snippet.thumbnails?.default?.url || '';
      const t = item.snippet.title;
      const c = item.snippet.channelTitle;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${thumb}" alt="" loading="lazy" />
          ${il ? '<span class="thumb-live">● LIVE</span>' : ''}
        </div>
        <div class="card-info">
          <div class="card-title">${escHtml(t)}</div>
          <div class="card-channel">${escHtml(c)}</div>
        </div>
      `;

      if (item.id.kind === 'youtube#channel') {
        card.onclick = () => searchChannel(ch, t);
      } else {
        card.onclick = () => playVideo(vid, t, c, il, allItems, query);
      }
      sidebarList.appendChild(card);
    });
  }

  async function searchChannel(channelId, channelName) {
    showLoading();
    const params = new URLSearchParams({
      part: 'snippet',
      channelId,
      key: API_KEY,
      maxResults: 24,
      order: 'date',
      type: 'video',
    });

    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
      const data = await res.json();
      if (data.error) { showError(data.error.message); return; }
      document.getElementById('search-input').value = channelName;
      renderResults(data.items || [], channelName);
    } catch(e) {
      showError('Network error.');
    }
  }

  // ─── HELPERS ─────────────────────────────────────────
  function showLoading() {
    document.getElementById('player-section').style.display = 'none';
    document.getElementById('results-sidebar').style.display = 'none';
    document.getElementById('main').className = 'no-video';
    document.getElementById('empty-state').style.display = 'none';
    const grid = document.getElementById('results-grid');
    grid.style.display = 'grid';
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Searching…</div>`;
  }

  function showError(msg) {
    const grid = document.getElementById('results-grid');
    grid.style.display = 'grid';
    grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">⚠️ ${escHtml(msg)}</div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
